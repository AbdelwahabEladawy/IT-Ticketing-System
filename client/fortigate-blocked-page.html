<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Blocked</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 24px;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        max-width: 720px;
        margin: 40px auto;
        background: #fff;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin-top: 0;
      }
      .row {
        margin-bottom: 10px;
      }
      .label {
        font-weight: 700;
      }
      .actions {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
        margin-top: 24px;
      }
      .button {
        text-decoration: none;
        border-radius: 10px;
        font-weight: 700;
        transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      }
      .button-primary {
        min-width: 220px;
        padding: 14px 18px;
        background: #4f46e5;
        color: #fff;
        text-align: center;
      }
      .button-primary:hover {
        background: #4338ca;
      }
      .button-secondary {
        padding: 10px 16px;
        border: 1px solid #cbd5e1;
        background: #fff;
        color: #0f172a;
      }
      .button-secondary:hover {
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Blocked by Firewall</h1>
      <div class="row"><span class="label">Blocked URL:</span> <span id="url-val">https://example.com</span></div>
      <div class="row"><span class="label">Description:</span> <span id="desc-val">Policy violation</span></div>
      <div class="row"><span class="label">Source IP:</span> <span id="src-val">10.0.0.1</span></div>
      <div class="actions">
        <a id="safety-btn" class="button button-primary" href="#">Back to Safety</a>
        <a id="ticket-btn" class="button button-secondary" href="#">Open Ticket</a>
      </div>
    </div>

    <script>
      window.onload = function () {
        // IMPORTANT: replace with your actual ticketing system public URL.
        // Example: "https://tickets.globalenergy-eg.net"
        var ticketSystemBaseUrl = "https://tickets.globalenergy-eg.net";

        var blockedUrl = document.getElementById("url-val").innerText;
        var description = document.getElementById("desc-val").innerText;
        var sourceIp = document.getElementById("src-val").innerText;
        var safeUrl = ticketSystemBaseUrl + "/";

        var fullDescription =
          "Blocked URL: " + blockedUrl + "\n" +
          "Reason: " + description + "\n" +
          "Source: " + sourceIp;

        var finalUrl =
          ticketSystemBaseUrl + "/tickets/create" +
          "?from=block" +
          "&title=" + encodeURIComponent("Fire wall issue") +
          "&description=" + encodeURIComponent(fullDescription) +
          "&category=" + encodeURIComponent("network");

        document.getElementById("safety-btn").href = safeUrl;
        document.getElementById("ticket-btn").href = finalUrl;
      };
    </script>
  </body>
</html>
